<div class="container">
    <div class="row">
        <div class="col-12">
            <mat-card appearance="outlined">
                <mat-card-header>
                    <mat-card-title>Grassland Ventures Fruit Database:</mat-card-title>
                </mat-card-header>
                <mat-card-content>
                    <table class="mat-table" mat-table [dataSource]="viewModel.fruitData$ | async">
                        <!-- Dynamically render columns -->
                        <ng-container *ngFor="let col of viewModel.columns" [matColumnDef]="col.name">
                          <th mat-header-cell *matHeaderCellDef> {{ col.label }} </th>
                          <td mat-cell *matCellDef="let fruit"> {{ col.valueGetter(fruit) }} </td>
                        </ng-container>
                      
                        <tr mat-header-row *matHeaderRowDef="viewModel.columnsToDisplay"></tr>
                        <tr mat-row *matRowDef="let row; columns: viewModel.columnsToDisplay"></tr>
                      </table>
                    <div class="loading-spinner-container" *ngIf="!!(viewModel.loadingFruit$|async)">
                        <mat-progress-spinner mode="indeterminate" color="primary"></mat-progress-spinner>
                    </div>
                </mat-card-content>
            </mat-card>
        </div>
    </div>
</div>
