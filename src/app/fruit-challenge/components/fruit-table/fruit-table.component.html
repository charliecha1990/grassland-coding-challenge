<div class="container">
    <div class="row">
        <div class="col-12">
            <mat-card appearance="outlined">
                <mat-card-header>
                    <mat-card-title>Grassland Ventures Fruit Database:</mat-card-title>
                </mat-card-header>
                <mat-card-content>
                    <div class="d-flex mb-3 align-items-center gap-3">
                        <mat-form-field appearance="outline" class="flex-grow-1">
                          <mat-label>Filter by name, genus, family, or order</mat-label>
                          <input matInput type="text" (input)="viewModel.setFilterText($event.target.value)" />
                        </mat-form-field>
                      
                        <mat-form-field appearance="outline">
                          <mat-label>Sort By</mat-label>
                          <mat-select (selectionChange)="viewModel.setSortOption($event.value)">
                            <mat-option value="Name Ascending">Name Ascending</mat-option>
                            <mat-option value="Name Descending">Name Descending</mat-option>
                            <mat-option value="Carbohydrates Ascending">Carbohydrates Ascending</mat-option>
                            <mat-option value="Carbohydrates Descending">Carbohydrates Descending</mat-option>
                          </mat-select>
                        </mat-form-field>
                      </div>

                    <table class="mat-table" mat-table [dataSource]="viewModel.fruitData$ | async">
                        <!-- Dynamically render columns -->                   
                        <ng-container *ngFor="let col of viewModel.columns" [matColumnDef]="col.name">
                          <th mat-header-cell *matHeaderCellDef> {{ col.label }} </th>
                          <td mat-cell *matCellDef="let fruit"> {{ col.valueGetter(fruit) }} </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="viewModel.columnsToDisplay"></tr>
                        <tr
                          mat-row
                          [ngClass]="{
                            'highlight-row': row.nutritions.calories <= 50 && row.nutritions.sugar >= 8,
                            'row-even': i % 2 === 0,
                            'row-odd': i % 2 !== 0,
                          }"
                          *matRowDef="let row; let i = index; columns: viewModel.columnsToDisplay"
                          (click)="openFruitDialog(row)"
                      ></tr>                     
                    </table>
                    <div class="loading-spinner-container" *ngIf="!!(viewModel.loadingFruit$|async)">
                        <mat-progress-spinner mode="indeterminate" color="primary"></mat-progress-spinner>
                    </div>
                </mat-card-content>
            </mat-card>
        </div>
    </div>
</div>
